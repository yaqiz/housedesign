<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>🏠 三关闯关 · Design Your Dream Home</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(145deg, #1b6b5e 0%, #0e4a41 100%);
            font-family: 'Comic Neue', 'Comic Sans MS', 'Segoe UI Emoji', 'Chalkboard SE', sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .game-container {
            max-width: 850px;
            width: 100%;
            background: #fffaf0;
            border-radius: 70px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.4);
            overflow: hidden;
            padding: 20px 20px 30px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #ffaa44;
            padding: 12px 24px;
            border-radius: 60px;
            margin-bottom: 20px;
            color: #2c2b1f;
            font-weight: bold;
            flex-wrap: wrap;
            gap: 8px;
        }
        .level-badge {
            background: #2c2b1f;
            color: #ffeaac;
            padding: 4px 18px;
            border-radius: 40px;
            font-size: 1.1rem;
        }
        .score-badge {
            background: #fff3d6;
            padding: 4px 18px;
            border-radius: 40px;
            font-size: 1.2rem;
        }
        .progress-bar {
            width: 100%;
            height: 14px;
            background: #d9c9b0;
            border-radius: 30px;
            margin-bottom: 24px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: #4c9f70;
            border-radius: 30px;
            transition: width 0.5s ease;
        }
        .question-area {
            background: #fef3e0;
            border-radius: 60px;
            padding: 24px 18px;
            text-align: center;
            min-height: 420px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .question-prompt {
            font-size: 1.6rem;
            font-weight: bold;
            color: #3d2b1a;
            margin-bottom: 20px;
        }
        .question-prompt .en {
            font-size: 1rem;
            color: #6b5a3e;
            display: block;
            font-weight: normal;
        }
        /* 第一关：消消乐网格 - 图标与单词配对 */
        .match-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            gap: 16px;
            width: 100%;
            max-width: 550px;
            margin: 10px auto;
        }
        .match-card {
            background: #ffdead;
            border-radius: 60px;
            padding: 12px 8px;
            text-align: center;
            font-size: 2.8rem;
            cursor: pointer;
            border: 4px solid #dba551;
            transition: 0.08s linear;
            box-shadow: 0 4px 8px rgba(0,0,0,0.08);
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .match-card .label-text {
            font-size: 0.9rem;
            color: #5a3f1f;
            display: block;
            margin-top: 2px;
        }
        .match-card.selected {
            border-color: #ff7700;
            background: #ffc489;
            transform: scale(0.94);
        }
        .match-card.matched {
            visibility: hidden;
            pointer-events: none;
            opacity: 0;
            transform: scale(0.5);
            transition: 0.15s;
        }
        /* 第二关：听音选择 */
        .options-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 18px;
            width: 100%;
            max-width: 500px;
        }
        .option-btn {
            background: #ffdead;
            border: 3px solid #dba551;
            border-radius: 60px;
            padding: 16px 12px;
            min-width: 100px;
            flex: 1 0 80px;
            max-width: 160px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.08s linear;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .option-btn .emoji { font-size: 2.8rem; }
        .option-btn .label { font-size: 0.9rem; text-transform: capitalize; }
        .option-btn:active { transform: scale(0.96); background: #ffc489; }
        .option-btn.correct { background: #6fbf73; border-color: #2a7a2a; color: white; }
        .option-btn.wrong { background: #e06868; border-color: #a13a3a; color: white; }
        .option-btn.disabled { pointer-events: none; opacity: 0.7; }
        .audio-btn {
            background: #f0a25e;
            border: none;
            font-size: 1.8rem;
            padding: 12px 28px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: bold;
            margin-bottom: 20px;
            box-shadow: 0 4px 0 #b06d2e;
            transition: 0.05s linear;
        }
        .audio-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #b06d2e; }
        /* 第三关：口语输出 - 具体房间图片 */
        .speech-card {
            background: #fff5e6;
            border-radius: 50px;
            padding: 20px;
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
        }
        .speech-card .room-image {
            font-size: 6rem;
            background: #ffe1b9;
            display: inline-block;
            padding: 20px 40px;
            border-radius: 60px;
            line-height: 1.4;
        }
        .speech-card .room-image .sub-emoji {
            font-size: 2.5rem;
            display: block;
        }
        .speech-frame {
            background: #e9dccb;
            border-radius: 40px;
            padding: 16px;
            margin: 15px 0;
            font-size: 1.2rem;
            line-height: 2;
            text-align: left;
            color: #3d2b1a;
        }
        .speech-frame .highlight {
            background: #ffd966;
            padding: 2px 8px;
            border-radius: 20px;
        }
        .speech-btn {
            background: #4c9f70;
            border: none;
            color: white;
            font-size: 1.3rem;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            margin: 8px;
            box-shadow: 0 4px 0 #1f5a33;
            transition: 0.05s linear;
        }
        .speech-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #1f5a33; }
        .speech-status {
            margin-top: 12px;
            background: #fff7ed;
            border: 2px solid #fed7aa;
            border-radius: 24px;
            padding: 10px 14px;
            font-size: 1rem;
            color: #7c4a16;
            text-align: center;
        }
        .speech-transcript {
            margin-top: 12px;
            background: #f8fafc;
            border: 2px dashed #cbd5e1;
            border-radius: 24px;
            padding: 12px 14px;
            font-size: 1rem;
            color: #334155;
            line-height: 1.6;
            min-height: 56px;
            text-align: left;
        }
        .feedback-msg {
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            min-height: 2.5rem;
            color: #3d5e3d;
        }
        .feedback-msg .en {
            font-size: 0.9rem;
            font-weight: normal;
            color: #6b5a3e;
            display: block;
        }
        .feedback-msg.encourage {
            color: #c47a1a;
            font-size: 1.3rem;
        }
        .next-btn {
            background: #4c9f70;
            border: none;
            color: white;
            font-size: 1.3rem;
            padding: 12px 36px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 18px;
            box-shadow: 0 4px 0 #1f5a33;
            transition: 0.05s linear;
        }
        .next-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #1f5a33; }
        .next-btn.hidden { display: none; }
        .final-screen {
            text-align: center;
            padding: 30px 10px;
        }
        .final-screen .big-emoji { font-size: 4rem; }
        .final-screen .title { font-size: 2rem; font-weight: bold; margin: 10px 0; }
        .reset-btn {
            background: #8b6946;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 60px;
            font-size: 1.2rem;
            cursor: pointer;
            margin-top: 20px;
        }
        @media (max-width: 500px) {
            .match-grid { grid-template-columns: repeat(auto-fit, minmax(70px, 1fr)); gap: 12px; }
            .match-card { font-size: 2rem; }
            .option-btn { min-width: 70px; flex: 1 0 60px; max-width: 120px; padding: 12px 6px; }
            .option-btn .emoji { font-size: 2rem; }
            .question-prompt { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<form name="house-design-game-results" method="POST" action="/" data-netlify="true" style="display:none">
    <input type="hidden" name="form-name" value="house-design-game-results">
    <input type="text" name="student_name">
    <input type="text" name="score">
    <input type="text" name="max_score">
    <input type="text" name="percent">
    <textarea name="result_json"></textarea>
    <input type="text" name="completed_at">
    <button type="submit">Submit</button>
</form>
<div class="game-container" id="app">
    <div class="header">
        <span>🏠 梦想之家 · Dream Home</span>
        <span class="level-badge" id="levelDisplay">第 1 / 3 关 · Level 1/3</span>
        <span class="score-badge">⭐ <span id="scoreDisplay">0</span></span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

    <div class="question-area" id="questionArea">
        <!-- 动态渲染由 JS 控制 -->
    </div>
</div>

<script>
    // ================= 三关题库 =================
    // 第一关：图标与单词匹配消消乐 (配对图标 ↔ 单词)
    // 第二关：听音选择 (听句子，选对应的房间/家具)
    // 第三关：口语输出 (给出具体房间图片和语言框架，学生自己介绍)

    // ---------- 第一关数据：8组 图标 ↔ 单词 配对 (更清晰) ----------
    const PAIRS = [
        { id: 'sofa', emoji: '🛋️', word: 'sofa' },
        { id: 'tv', emoji: '📺', word: 'tv' },
        { id: 'bed', emoji: '🛏️', word: 'bed' },
        { id: 'fridge', emoji: '🧊', word: 'fridge' },
        { id: 'bathtub', emoji: '🛁', word: 'bathtub' },
        { id: 'stove', emoji: '🍳', word: 'stove' },
        { id: 'desk', emoji: '📖', word: 'desk' },
        { id: 'lamp', emoji: '💡', word: 'lamp' }
    ];

    // 第二关：听音选择题 (播放句子，选对应房间/家具)
    const LISTEN_LEVELS = [
        {
            prompt: '🔊 听句子，选择对应的房间',
            promptEn: 'Listen and choose the correct room',
            audioText: 'This is my living room. It is warm and cozy.',
            options: [
                { emoji: '🛋️', label: 'living room', correct: true },
                { emoji: '🛏️', label: 'bedroom', correct: false },
                { emoji: '🍳', label: 'kitchen', correct: false },
            ]
        },
        {
            prompt: '🔊 听句子，选择对应的房间',
            promptEn: 'Listen and choose the correct room',
            audioText: 'I have a soft bed and a lamp in my bedroom.',
            options: [
                { emoji: '🛏️', label: 'bedroom', correct: true },
                { emoji: '🛁', label: 'bathroom', correct: false },
                { emoji: '📖', label: 'study', correct: false },
            ]
        },
        {
            prompt: '🔊 听句子，选择对应的家具',
            promptEn: 'Listen and choose the correct furniture',
            audioText: 'I cook food with this. It is in the kitchen.',
            options: [
                { emoji: '🍳', label: 'stove', correct: true },
                { emoji: '🧊', label: 'fridge', correct: false },
                { emoji: '🛋️', label: 'sofa', correct: false },
            ]
        },
        {
            prompt: '🔊 听句子，选择对应的房间',
            promptEn: 'Listen and choose the correct room',
            audioText: 'I take a bath here. It is clean and fresh.',
            options: [
                { emoji: '🛁', label: 'bathroom', correct: true },
                { emoji: '🛋️', label: 'living room', correct: false },
                { emoji: '📖', label: 'study', correct: false },
            ]
        }
    ];

    // 第三关：口语输出 (具体房间图片，包含多个元素)
    const SPEECH_LEVELS = [
        {
            emoji: '🛋️',
            subEmojis: '📺 🪑',
            roomName: 'Living Room',
            roomNameCn: '客厅',
            color: 'warm yellow',
            colorCn: '暖黄色',
            size: 'spacious',
            sizeCn: '宽敞',
            furniture: 'sofa, TV and a chair',
            furnitureCn: '沙发、电视和椅子',
            hint: 'This is my living room. It is warm yellow and spacious. There is a sofa, a TV and a chair.',
            hintCn: '这是我的客厅。它是暖黄色的，很宽敞。有一张沙发、一台电视和一把椅子。'
        },
        {
            emoji: '🛏️',
            subEmojis: '💡 📚',
            roomName: 'Bedroom',
            roomNameCn: '卧室',
            color: 'light blue',
            colorCn: '浅蓝色',
            size: 'quiet',
            sizeCn: '安静',
            furniture: 'bed, a lamp and books',
            furnitureCn: '床、台灯和书',
            hint: 'This is my bedroom. It is light blue and quiet. There is a bed, a lamp and some books.',
            hintCn: '这是我的卧室。它是浅蓝色的，很安静。有一张床、一盏台灯和一些书。'
        },
        {
            emoji: '🍳',
            subEmojis: '🧊 🍽️',
            roomName: 'Kitchen',
            roomNameCn: '厨房',
            color: 'light green',
            colorCn: '浅绿色',
            size: 'bright',
            sizeCn: '明亮',
            furniture: 'stove, fridge and a plate',
            furnitureCn: '炉灶、冰箱和盘子',
            hint: 'This is my kitchen. It is light green and bright. There is a stove, a fridge and a plate.',
            hintCn: '这是我的厨房。它是浅绿色的，很明亮。有一个炉灶、一个冰箱和一个盘子。'
        }
    ];

    // 游戏状态
    let currentLevel = 1;          // 1, 2, 3
    let currentSubIndex = 0;       // 每个关卡内的子进度
    let score = 0;
    let isAnswered = false;
    let audioSynth = window.speechSynthesis;
    let gameStudentName = '';
    let gameResultSubmitted = false;
    let gameTranscriptLog = [];
    let micStream = null;
    let recognition = null;
    let micReady = false;
    let recognitionSupported = false;
    let currentTranscript = '';

    // 第一关匹配状态
    let matchCards = [];
    let selectedIndex = null;
    let matchedPairs = 0;

    const app = document.getElementById('app');
    const questionArea = document.getElementById('questionArea');
    const levelDisplay = document.getElementById('levelDisplay');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const progressFill = document.getElementById('progressFill');

    function getQueryParam(name) {
        try {
            return new URLSearchParams(window.location.search).get(name) || '';
        } catch (_) {
            return '';
        }
    }

    function initGameStudent() {
        const queryName = getQueryParam('student').trim();
        const storedName = (localStorage.getItem('houseDesignStudentName') || '').trim();
        gameStudentName = queryName || storedName;
        if (gameStudentName) {
            localStorage.setItem('houseDesignStudentName', gameStudentName);
        } else {
            alert('Please enter your name on the home page before opening the game. / 请先在首页输入名字，再打开小游戏。');
            window.location.href = './index.html';
        }
    }

    function saveGameResult(scoreValue, maxScoreValue, percentValue) {
        const payload = {
            studentName: gameStudentName || 'Student',
            score: scoreValue,
            maxScore: maxScoreValue,
            percent: percentValue,
            transcriptLog: gameTranscriptLog.slice(),
            completedAt: new Date().toISOString()
        };
        try {
            localStorage.setItem('houseDesignLatestGameResult', JSON.stringify(payload));
            localStorage.setItem('houseDesignLatestGameResult_' + encodeURIComponent((gameStudentName || '').trim().toLowerCase()), JSON.stringify(payload));
        } catch (_) {}

        if (window.location.protocol === 'file:' || gameResultSubmitted) return;
        gameResultSubmitted = true;

        const form = document.createElement('form');
        form.method = 'POST';
        form.action = '/';
        form.style.display = 'none';
        const fields = {
            'form-name': 'house-design-game-results',
            'student_name': payload.studentName,
            'score': String(payload.score),
            'max_score': String(payload.maxScore),
            'percent': String(payload.percent),
            'result_json': JSON.stringify(payload),
            'completed_at': payload.completedAt
        };
        Object.keys(fields).forEach((key) => {
            const input = document.createElement(key === 'result_json' ? 'textarea' : 'input');
            input.name = key;
            input.value = fields[key];
            form.appendChild(input);
        });
        document.body.appendChild(form);
        form.submit();
        setTimeout(() => { try { form.remove(); } catch (_) {} }, 1000);
    }

    function setupSpeechRecognition() {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        recognitionSupported = !!SpeechRecognition;
        if (!recognitionSupported) return;
        recognition = new SpeechRecognition();
        recognition.lang = 'en-US';
        recognition.interimResults = true;
        recognition.continuous = false;
        recognition.onresult = function (event) {
            let transcript = '';
            for (let i = event.resultIndex; i < event.results.length; i++) {
                transcript += event.results[i][0].transcript + ' ';
            }
            currentTranscript = transcript.trim();
            updateSpeechTranscript();
        };
        recognition.onerror = function () {
            updateSpeechStatus('Mic ready, but speech recognition had a problem. You can still speak and then tap score. / 麦克风已开启，但语音识别出了点问题，你仍然可以说完后手动得分。');
        };
        recognition.onend = function () {
            const listenBtn = document.getElementById('speechListenBtn');
            if (listenBtn) listenBtn.disabled = false;
        };
    }

    function updateSpeechStatus(text) {
        const box = document.getElementById('speechStatus');
        if (box) box.textContent = text;
    }

    function updateSpeechTranscript() {
        const box = document.getElementById('speechTranscript');
        if (box) {
            box.textContent = currentTranscript || 'No speech captured yet. / 还没有识别到语音。';
        }
    }

    async function enableMicrophone() {
        if (micReady) {
            updateSpeechStatus(recognitionSupported ? 'Microphone is ready. Tap Start Listening. / 麦克风已开启，点击开始收听。' : 'Microphone is ready. Your browser may not support speech-to-text. / 麦克风已开启，但浏览器可能不支持语音转文字。');
            return;
        }
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            updateSpeechStatus('This browser does not support microphone access. / 这个浏览器不支持麦克风权限。');
            return;
        }
        try {
            micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            micReady = true;
            updateSpeechStatus(recognitionSupported ? 'Microphone ready. Tap Start Listening and speak in English. / 麦克风已开启，点击开始收听并用英语说。' : 'Microphone ready. You can speak now, then tap score manually. / 麦克风已开启，你可以直接说，然后手动点得分。');
        } catch (_) {
            updateSpeechStatus('Microphone permission was denied. / 麦克风权限没有打开。');
        }
    }

    function startSpeechCapture() {
        if (!micReady) {
            updateSpeechStatus('Please enable the microphone first. / 请先开启麦克风。');
            return;
        }
        if (!recognitionSupported || !recognition) {
            updateSpeechStatus('Speech-to-text is not supported here. Speak anyway, then tap score manually. / 当前浏览器不支持语音转文字，你可以说完后手动点得分。');
            return;
        }
        try {
            currentTranscript = '';
            updateSpeechTranscript();
            recognition.start();
            const listenBtn = document.getElementById('speechListenBtn');
            if (listenBtn) listenBtn.disabled = true;
            updateSpeechStatus('Listening... Please describe your room. / 正在收听，请开始介绍你的房间。');
        } catch (_) {
            updateSpeechStatus('Could not start speech recognition. / 无法启动语音识别。');
        }
    }

    // 鼓励语库 (中英双语)
    const ENCOURAGE_PHRASES = [
        { zh: '💪 再试一次！你可以的！', en: 'Try again! You can do it!' },
        { zh: '😊 加油！继续努力！', en: 'Keep going! You\'ve got this!' },
        { zh: '🌟 别放弃！再来一次！', en: 'Don\'t give up! Try one more time!' },
        { zh: '👍 不错！再试试！', en: 'Nice try! Have another go!' },
        { zh: '✨ 快接近了！再试一次！', en: 'You\'re getting closer! Try again!' }
    ];

    function getRandomEncourage() {
        const p = ENCOURAGE_PHRASES[Math.floor(Math.random() * ENCOURAGE_PHRASES.length)];
        return `${p.zh} ${p.en}`;
    }

    function updateUI() {
        scoreDisplay.innerText = score;
        const totalSubLevels = getTotalSubLevels();
        const completed = getCompletedCount();
        const progress = (completed / totalSubLevels) * 100;
        progressFill.style.width = Math.min(progress, 100) + '%';
        const levelNames = ['图文匹配 · Match', '听音选择 · Listen', '口语输出 · Speak'];
        levelDisplay.innerText = `第 ${currentLevel} / 3 关 · ${levelNames[currentLevel-1]}`;
    }

    function getTotalSubLevels() {
        if (currentLevel === 1) return 1;
        if (currentLevel === 2) return LISTEN_LEVELS.length;
        if (currentLevel === 3) return SPEECH_LEVELS.length;
        return 1;
    }

    function getCompletedCount() {
        if (currentLevel === 1) return matchedPairs === PAIRS.length ? 1 : 0;
        if (currentLevel === 2) return currentSubIndex;
        if (currentLevel === 3) return currentSubIndex;
        return 0;
    }

    function speakText(text, callback) {
        if (audioSynth) {
            audioSynth.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.85;
            utterance.onend = () => { if (callback) callback(); };
            audioSynth.speak(utterance);
        } else {
            if (callback) callback();
        }
    }

    // ================= 第一关：消消乐 (图标 ↔ 单词 匹配) =================
    function renderLevel1() {
        currentLevel = 1;
        currentSubIndex = 0;
        matchedPairs = 0;
        selectedIndex = null;
        // 生成卡片数据：一半图标，一半单词 (打乱顺序)
        let deck = [];
        PAIRS.forEach(p => {
            deck.push({ pairId: p.id, type: 'icon', emoji: p.emoji, word: p.word, matched: false });
            deck.push({ pairId: p.id, type: 'word', emoji: '', word: p.word, matched: false });
        });
        // 洗牌 (每次顺序不同)
        for (let i = deck.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [deck[i], deck[j]] = [deck[j], deck[i]];
        }
        matchCards = deck;

        questionArea.innerHTML = '';
        const prompt = document.createElement('div');
        prompt.className = 'question-prompt';
        prompt.innerHTML = `
            🖼️ 点击配对：图标 ↔ 对应的英文单词 (消消乐)
            <span class="en">Match the icon with the correct word</span>
        `;
        questionArea.appendChild(prompt);

        const grid = document.createElement('div');
        grid.className = 'match-grid';
        grid.id = 'matchGrid';
        questionArea.appendChild(grid);

        const feedback = document.createElement('div');
        feedback.className = 'feedback-msg';
        feedback.id = 'feedbackMsg';
        questionArea.appendChild(feedback);

        renderMatchGrid();
        updateUI();
    }

    function renderMatchGrid() {
        const grid = document.getElementById('matchGrid');
        if (!grid) return;
        grid.innerHTML = '';
        matchCards.forEach((card, idx) => {
            const div = document.createElement('div');
            div.className = 'match-card';
            if (card.matched) div.classList.add('matched');
            if (selectedIndex === idx && !card.matched) div.classList.add('selected');
            if (card.type === 'icon') {
                div.innerHTML = `${card.emoji}`;
            } else {
                div.innerHTML = `<span style="font-size:1.4rem;">${card.word}</span>`;
            }
            div.dataset.index = idx;
            div.addEventListener('click', () => handleMatchClick(idx));
            grid.appendChild(div);
        });
        // 检查是否全部匹配
        if (matchCards.every(c => c.matched)) {
            const fb = document.getElementById('feedbackMsg');
            if (fb) {
                fb.innerHTML = '🎉 全部配对完成！进入下一关 ➡️ <span class="en">All matched! Go to next level</span>';
                fb.style.color = '#2a7a2a';
            }
            const oldBtn = document.querySelector('.next-btn');
            if (oldBtn) oldBtn.remove();
            const nextBtn = document.createElement('button');
            nextBtn.className = 'next-btn';
            nextBtn.innerText = '➡️ 进入第二关 · Go to Level 2';
            nextBtn.addEventListener('click', () => {
                currentLevel = 2;
                currentSubIndex = 0;
                renderLevel2();
            });
            questionArea.appendChild(nextBtn);
            updateUI();
        }
    }

    function handleMatchClick(index) {
        const card = matchCards[index];
        if (card.matched) return;
        if (selectedIndex === null) {
            selectedIndex = index;
            renderMatchGrid();
            return;
        }
        if (selectedIndex === index) {
            selectedIndex = null;
            renderMatchGrid();
            return;
        }
        const first = matchCards[selectedIndex];
        const second = matchCards[index];
        if (first.type !== second.type && first.pairId === second.pairId) {
            // 配对成功
            first.matched = true;
            second.matched = true;
            matchedPairs++;
            score += 5; // 每题5分，共8题40分
            updateUI();
            const fb = document.getElementById('feedbackMsg');
            if (fb) {
                fb.innerHTML = '✅ 配对成功！ +5分 <span class="en">Match! +5 points</span>';
                fb.style.color = '#2a7a2a';
            }
            selectedIndex = null;
            renderMatchGrid();
            if (matchCards.every(c => c.matched)) {
                const fb2 = document.getElementById('feedbackMsg');
                if (fb2) fb2.innerHTML = '🎉 第一关完成！点击按钮进入第二关 <span class="en">Level 1 complete! Go to Level 2</span>';
                const oldBtn = document.querySelector('.next-btn');
                if (oldBtn) oldBtn.remove();
                const nextBtn = document.createElement('button');
                nextBtn.className = 'next-btn';
                nextBtn.innerText = '➡️ 进入第二关 · Go to Level 2';
                nextBtn.addEventListener('click', () => {
                    currentLevel = 2;
                    currentSubIndex = 0;
                    renderLevel2();
                });
                questionArea.appendChild(nextBtn);
                updateUI();
            }
        } else {
            // 配对失败 - 鼓励提示
            const fb = document.getElementById('feedbackMsg');
            if (fb) {
                fb.innerHTML = '❌ ' + getRandomEncourage();
                fb.className = 'feedback-msg encourage';
            }
            selectedIndex = null;
            renderMatchGrid();
        }
    }

    // ================= 第二关：听音选择 =================
    function renderLevel2() {
        currentLevel = 2;
        if (currentSubIndex >= LISTEN_LEVELS.length) {
            questionArea.innerHTML = `
                <div style="padding:20px; text-align:center;">
                    <div style="font-size:3rem;">🎧</div>
                    <div style="font-size:1.5rem; font-weight:bold; margin:10px 0;">第二关完成！ <span style="font-size:1rem; font-weight:normal; display:block;">Level 2 Complete!</span></div>
                    <button class="next-btn" id="goToLevel3">➡️ 进入第三关 · 口语输出 <span style="font-size:0.8rem; display:block;">Go to Level 3 · Speaking</span></button>
                </div>
            `;
            document.getElementById('goToLevel3').addEventListener('click', () => {
                currentLevel = 3;
                currentSubIndex = 0;
                renderLevel3();
            });
            updateUI();
            return;
        }

        const level = LISTEN_LEVELS[currentSubIndex];
        isAnswered = false;
        questionArea.innerHTML = '';

        const prompt = document.createElement('div');
        prompt.className = 'question-prompt';
        prompt.innerHTML = `${level.prompt} <span class="en">${level.promptEn}</span>`;
        questionArea.appendChild(prompt);

        const audioBtn = document.createElement('button');
        audioBtn.className = 'audio-btn';
        audioBtn.innerText = '🔊 点击播放 · Listen';
        audioBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            speakText(level.audioText);
        });
        questionArea.appendChild(audioBtn);

        const grid = document.createElement('div');
        grid.className = 'options-grid';
        const shuffled = [...level.options].sort(() => Math.random() - 0.5);
        shuffled.forEach((opt) => {
            const btn = document.createElement('div');
            btn.className = 'option-btn';
            btn.innerHTML = `<span class="emoji">${opt.emoji}</span><span class="label">${opt.label}</span>`;
            btn.dataset.correct = opt.correct ? 'true' : 'false';
            btn.addEventListener('click', () => {
                if (isAnswered) return;
                const isCorrect = btn.dataset.correct === 'true';
                document.querySelectorAll('.option-btn').forEach(b => b.classList.add('disabled'));
                if (isCorrect) {
                    btn.classList.add('correct');
                    score += 10; // 每题10分，4题共40分
                    updateUI();
                    showFeedback2('✅ 正确！ +10分 <span class="en">Correct! +10 points</span>', 'success');
                } else {
                    btn.classList.add('wrong');
                    document.querySelectorAll('.option-btn').forEach(b => {
                        if (b.dataset.correct === 'true') b.classList.add('correct');
                    });
                    showFeedback2('❌ ' + getRandomEncourage(), 'error');
                }
                isAnswered = true;
                const nextBtn = document.createElement('button');
                nextBtn.className = 'next-btn';
                nextBtn.innerText = currentSubIndex === LISTEN_LEVELS.length - 1 ? '📢 完成第二关 · Finish Level 2' : '➡️ 下一题 · Next';
                nextBtn.addEventListener('click', () => {
                    currentSubIndex++;
                    renderLevel2();
                });
                questionArea.appendChild(nextBtn);
            });
            grid.appendChild(btn);
        });
        questionArea.appendChild(grid);

        const feedback = document.createElement('div');
        feedback.className = 'feedback-msg';
        feedback.id = 'feedbackMsg2';
        questionArea.appendChild(feedback);
        updateUI();
    }

    function showFeedback2(msg, type) {
        const fb = document.getElementById('feedbackMsg2');
        if (fb) {
            fb.innerHTML = msg;
            fb.style.color = type === 'success' ? '#2a7a2a' : '#c47a1a';
            if (type === 'error') fb.className = 'feedback-msg encourage';
            else fb.className = 'feedback-msg';
        }
    }

    // ================= 第三关：口语输出 (具体房间图片) =================
    function renderLevel3() {
        currentLevel = 3;
        currentTranscript = '';
        if (currentSubIndex >= SPEECH_LEVELS.length) {
            renderFinalScreen();
            return;
        }

        const level = SPEECH_LEVELS[currentSubIndex];
        questionArea.innerHTML = '';

        const prompt = document.createElement('div');
        prompt.className = 'question-prompt';
        prompt.innerHTML = `🎤 第 ${currentSubIndex + 1} 关 · 看图介绍你的房间 <span class="en">Look at the picture and introduce your room</span>`;
        questionArea.appendChild(prompt);

        const card = document.createElement('div');
        card.className = 'speech-card';
        card.innerHTML = `
            <div style="text-align:center;">
                <div class="room-image">
                    ${level.emoji}
                    <span class="sub-emoji">${level.subEmojis}</span>
                </div>
                <div style="font-size:1.5rem; font-weight:bold; margin:8px 0;">
                    ${level.roomName} · ${level.roomNameCn}
                </div>
            </div>
            <div class="speech-frame">
                <div>📋 语言框架 · Language Framework：</div>
                <div>1️⃣ <span class="highlight">This is my ______.</span>  (这是我的______。)</div>
                <div>2️⃣ <span class="highlight">It is ______</span> (颜色 · color).</div>
                <div>3️⃣ <span class="highlight">There is a ______ and a ______.</span> (有______和______。)</div>
                <div style="margin-top:8px; background:#fff2d6; padding:8px; border-radius:20px; font-size:1rem;">
                    💡 示例 · Example: <br>
                    <span style="font-weight:bold;">${level.hint}</span><br>
                    <span style="color:#6b5a3e;">${level.hintCn}</span>
                </div>
            </div>
            <div style="display:flex; flex-wrap:wrap; justify-content:center; gap:12px;">
                <button class="speech-btn" id="listenExampleBtn">🔊 听示例 · Listen</button>
                <button class="speech-btn" id="enableMicBtn" style="background:#f0a25e;box-shadow:0 4px 0 #b06d2e;">🎙️ 开启麦克风 · Enable Mic</button>
                <button class="speech-btn" id="speechListenBtn" style="background:#2563eb;box-shadow:0 4px 0 #1d4ed8;">🗣️ 开始收听 · Start Listening</button>
                <button class="speech-btn" id="recordDoneBtn">✅ 我说完了，得分！ <span style="font-size:0.8rem; display:block;">I\'m done! Score me!</span></button>
            </div>
            <div class="speech-status" id="speechStatus">Tap Enable Mic first. Speech recognition will try to help, but manual scoring still works. / 先点开启麦克风。系统会尽量识别语音，但仍可手动得分。</div>
            <div class="speech-transcript" id="speechTranscript">No speech captured yet. / 还没有识别到语音。</div>
        `;
        questionArea.appendChild(card);

        const feedback = document.createElement('div');
        feedback.className = 'feedback-msg';
        feedback.id = 'feedbackMsg3';
        feedback.innerHTML = '👩‍🏫 请根据框架口头介绍，然后点击 "我说完了" 得分！ <span class="en">Please introduce orally, then click "I\'m done!" to get points.</span>';
        questionArea.appendChild(feedback);

        document.getElementById('listenExampleBtn').addEventListener('click', () => {
            speakText(level.hint);
        });
        document.getElementById('enableMicBtn').addEventListener('click', enableMicrophone);
        document.getElementById('speechListenBtn').addEventListener('click', startSpeechCapture);

        let scored = false;
        document.getElementById('recordDoneBtn').addEventListener('click', () => {
            if (scored) return;
            scored = true;
            gameTranscriptLog.push({
                level: currentSubIndex + 1,
                roomName: level.roomName,
                transcript: currentTranscript || ''
            });
            score += 20; // 每题20分，3题共60分
            updateUI();
            const fb = document.getElementById('feedbackMsg3');
            if (fb) {
                fb.innerHTML = '🎉 太棒了！ +20分 口语小达人！ <span class="en">Great! +20 points! Speaking star!</span>';
                fb.style.color = '#2a7a2a';
            }
            const nextBtn = document.createElement('button');
            nextBtn.className = 'next-btn';
            nextBtn.innerText = currentSubIndex === SPEECH_LEVELS.length - 1 ? '🏆 查看成绩 · See Results' : '➡️ 下一房间 · Next Room';
            nextBtn.addEventListener('click', () => {
                currentSubIndex++;
                renderLevel3();
            });
            questionArea.appendChild(nextBtn);
        });

        updateUI();
    }

    // ================= 最终结算 =================
    function renderFinalScreen() {
        const maxScore = 140; // 第一关40 + 第二关40 + 第三关60
        const percent = Math.round((score / maxScore) * 100);
        saveGameResult(score, maxScore, percent);
        questionArea.innerHTML = `
            <div class="final-screen">
                <div class="big-emoji">🏆</div>
                <div class="title">🎉 闯关完成！ <span style="font-size:1.2rem; display:block; font-weight:normal;">All Levels Complete!</span></div>
                <div style="font-size:2.5rem; margin: 10px 0;">⭐ ${score} / ${maxScore} 分 · points</div>
                <div style="font-size:1.8rem; font-weight:bold; color:#4c9f70;">${percent}%</div>
                <div style="font-size:1.2rem; margin-bottom:20px;">你已经是优秀的小小设计师啦！ <span style="display:block; font-weight:normal; color:#6b5a3e;">You are a great little designer!</span></div>
                <div style="display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:20px">
                    <button class="reset-btn" id="resetGameBtn">🔄 重新挑战 · Play Again</button>
                    <button class="reset-btn" id="backHomeBtn" style="background:#4c9f70">🏠 返回首页 · Back to Home</button>
                </div>
            </div>
        `;
        document.getElementById('resetGameBtn').addEventListener('click', resetGame);
        document.getElementById('backHomeBtn').addEventListener('click', function () {
            const target = './index.html' + (gameStudentName ? ('?student=' + encodeURIComponent(gameStudentName)) : '');
            window.location.href = target;
        });
        progressFill.style.width = '100%';
        levelDisplay.innerText = '🏁 通关 · Complete';
    }

    // ================= 重置 =================
    function resetGame() {
        currentLevel = 1;
        currentSubIndex = 0;
        score = 0;
        matchedPairs = 0;
        selectedIndex = null;
        gameResultSubmitted = false;
        if (audioSynth) audioSynth.cancel();
        renderLevel1();
        updateUI();
    }

    // ================= 启动 =================
    initGameStudent();
    setupSpeechRecognition();
    renderLevel1();
    updateUI();
</script>
